<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>QSolar | Solar System Designer</title>
    <link rel="icon" type="image/x-icon" href="1774361357592.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QSolar">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #DC8623;
            --primary-dark: #b56c1c;
            --primary-light: #f0a450;
            --secondary: #2E438F;
            --secondary-dark: #1f2f63;
            --bg-dark: #0B1120;
            --surface: #111827;
            --surface-light: #1F2937;
            --surface-lighter: #2D3A4F;
            --text-primary: #F3F4F6;
            --text-secondary: #9CA3AF;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --border: #2D3A4F;
            --transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.rtl {
            direction: rtl;
            font-family: 'Cairo', sans-serif;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            overflow-x: hidden;
        }

        .header {
            background: var(--primary);
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-button {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-button:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background-image: url('1774361357592.png');
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .logo-area h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: white;
        }

        .lang-toggle {
            background: var(--secondary);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .lang-toggle:active {
            transform: scale(0.96);
        }

        .main-content {
            flex: 1;
            padding: 20px 18px;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .steps-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--surface-light);
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--border);
            padding: 8px 12px 12px;
            z-index: 20;
            border-radius: 28px 28px 0 0;
        }

        .step {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            border-radius: 32px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .step.active {
            background: var(--primary);
            color: white;
        }

        .step.completed {
            color: var(--success);
        }

        .step i {
            display: block;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .card {
            background: var(--surface-light);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .device-preset {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            position: relative;
            transition: all 0.2s ease;
        }

        .device-preset:hover {
            border-color: var(--primary-light);
            background: var(--surface-lighter);
        }

        .device-icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .device-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .device-power {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .add-button {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 32px;
            height: 32px;
            background: var(--primary);
            border: 2px solid var(--surface);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 2;
        }

        .add-button i {
            font-size: 0.9rem;
            color: white;
        }

        .add-button:active {
            transform: scale(0.85);
            background: var(--primary-dark);
        }

        body.rtl .add-button {
            right: auto;
            left: -10px;
        }

        .devices-list {
            max-height: 450px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .devices-list::-webkit-scrollbar {
            width: 4px;
        }

        .devices-list::-webkit-scrollbar-track {
            background: var(--surface);
            border-radius: 4px;
        }

        .devices-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        .device-item {
            background: var(--surface);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .device-header:active {
            background: var(--surface-lighter);
        }

        .device-name-display {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .device-name-display i {
            color: var(--primary);
            font-size: 1.2rem;
        }

        .expand-icon {
            color: var(--text-secondary);
            transition: transform 0.3s ease;
        }

        .device-item.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .device-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding: 0 16px;
        }

        .device-item.expanded .device-details {
            max-height: 300px;
            padding: 0 16px 16px 16px;
        }

        .delete-device {
            background: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1rem;
            padding: 8px;
            border-radius: 20px;
            transition: var(--transition);
        }

        .delete-device:active {
            transform: scale(0.9);
        }

        .device-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .field input, .field select {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 10px;
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
        }

        .mixed-slider {
            margin-top: 8px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--surface-lighter);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .mixed-slider label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .summary-card {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .result-card {
            background: linear-gradient(135deg, var(--surface-light), var(--surface));
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--primary);
        }

        .result-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .warning-card {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: 16px;
            padding: 12px;
            margin-top: 12px;
        }

        .warning-item {
            color: var(--warning);
            font-size: 0.75rem;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 48px;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 16px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--surface-lighter);
            border: 1px solid var(--border);
            width: 100%;
            padding: 12px;
            border-radius: 48px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .calculation-details {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }

        .formula-item {
            font-size: 0.75rem;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-family: monospace;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-light);
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 200;
            max-width: 85%;
            text-align: center;
            pointer-events: none;
            animation: toastSlide 0.3s ease-out;
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .tooltip-icon {
            color: var(--info);
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 6px;
            transition: var(--transition);
        }
        .tooltip-icon:active {
            transform: scale(0.9);
        }
        body.rtl .tooltip-icon {
            margin-left: 0;
            margin-right: 6px;
        }
        .tooltip-text {
            background: var(--surface-lighter);
            border-left: 3px solid var(--primary);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.7rem;
            margin-top: 6px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .disclaimer-note {
            background: rgba(59,130,246,0.1);
            border-left: 3px solid var(--info);
            border-radius: 16px;
            padding: 14px;
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .disclaimer-note i {
            color: var(--info);
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="header">
        <div class="logo-area">
            <button class="back-button" id="backToMainBtn"><i class="fas fa-arrow-left"></i></button>
            <div class="logo-icon"></div>
            <h1 id="appTitle">المصمم الشمسي</h1>
        </div>
        <button class="lang-toggle" id="langToggleBtn"><i class="fas fa-globe"></i></button>
    </div>
    <div class="main-content" id="mainContent">
        <div id="dynamicView"></div>
    </div>
</div>

<script>
    // Translations with tooltips
    const translations = {
        ar: {
            appName: "المصمم الشمسي",
            step1: "الأجهزة", step2: "الإعدادات", step3: "المكونات", step4: "النتائج", step5: "التفاصيل",
            devicePresetsTitle: "أضف جهازاً", customDeviceBtn: "+ جهاز مخصص", power: "الاستطاعة (W)", hours: "ساعات/اليوم", usageType: "نوع الاستخدام",
            dayType: "نهاري", nightType: "ليلي", mixedType: "مختلط", mixedRatio: "النسبة النهارية", totalEnergy: "إجمالي الطاقة اليومية",
            dayEnergy: "الطاقة النهارية", nightEnergy: "الطاقة الليلية", peakSunHours: "ساعات الذروة الشمسية", autonomyDays: "أيام الاستقلالية",
            batteryType: "نوع البطارية", lithium: "ليثيوم أيون (LiFePO4)", leadAcid: "جل/AGM (رصاصي)", simultaneityFactor: "عامل التزامن",
            inverterMargin: "هامش أمان الانفرتر", panelPower: "استطاعة اللوح المفرد (Wp)", batteryCapacity: "سعة البطارية الواحدة (Ah)",
            batteryVoltage: "جهد البطارية (V)", systemVoltage: "نظام الجهد", calculate: "احسب التجميعة", saveSystem: "حفظ التجميعة",
            pvRequired: "استطاعة الألواح المطلوبة", panelsCount: "عدد الألواح", batteryRequired: "سعة البطارية المطلوبة",
            batteriesCount: "عدد البطاريات", inverterPower: "استطاعة الانفرتر", recommended: "النتائج الموصى بها",
            emptyDevices: "أضف جهازاً واحداً على الأقل", saved: "تم حفظ التجميعة", calculationDetails: "تفاصيل العمليات الحسابية",
            formulaTotalEnergy: "إجمالي الطاقة = Σ (الاستطاعة × ساعات الاستخدام)", formulaPvPower: "استطاعة الألواح = (الطاقة الإجمالية × معامل الفقد) ÷ (ساعات الذروة × كفاءة الشاحن)",
            formulaBattery: "سعة البطارية = (الطاقة الليلية × أيام الاستقلالية) ÷ (عمق التفريغ × كفاءة البطارية × جهد النظام)",
            formulaInverter: "استطاعة الانفرتر = (أعلى حمل متزامن × هامش الأمان) ÷ كفاءة الانفرتر",
            chargerEfficiency: "كفاءة الشاحن", inverterEfficiency: "كفاءة الانفرتر", batteryEfficiency: "كفاءة البطارية", lossFactor: "معامل الفقد",
            warnings: "تحذيرات النظام", requiredArea: "المساحة المطلوبة للألواح", systemCurrent: "تيار النظام", cableSection: "مقطع الكابل الموصى به",
            // tooltips
            tooltip_autonomy: "عدد الأيام التي يمكن للنظام العمل فيها بدون شمس (أيام غائمة متتالية)",
            tooltip_simultaneity: "نسبة الأجهزة التي تعمل في نفس الوقت (يتراوح بين 0.3-0.8 حسب نمط الاستخدام)",
            tooltip_inverterMargin: "نسبة إضافية لحماية الانفرتر من الأحمال اللحظية العالية",
            tooltip_chargerEfficiency: "كفاءة منظم الشحن MPPT (95-99%)",
            tooltip_inverterEfficiency: "كفاءة تحويل التيار من DC إلى AC (85-95%)",
            tooltip_batteryEfficiency: "كفاءة شحن وتفريغ البطارية (80-90%)",
            tooltip_lossFactor: "نسبة الفقد في الكابلات والأتربة والحرارة (15-25%)",
            disclaimer: "⚠️ ملاحظة: هذه الحسابات نظرية وتقديرية تعتمد على معطيات افتراضية. قد تختلف النتائج في الظروف الحقيقية بنسبة 10-30% حسب: ظروف الطقس الفعلية (الغبار، الحرارة، الغيوم) - كفاءة المعدات المستخدمة - نمط الاستخدام الفعلي للأجهزة."
        },
        en: {
            appName: "Solar Designer", step1: "Devices", step2: "Settings", step3: "Components", step4: "Results", step5: "Details",
            devicePresetsTitle: "Add Device", customDeviceBtn: "+ Custom Device", power: "Power (W)", hours: "Hours/Day", usageType: "Usage Type",
            dayType: "Daytime", nightType: "Nighttime", mixedType: "Mixed", mixedRatio: "Daytime Ratio", totalEnergy: "Total Daily Energy",
            dayEnergy: "Daytime Energy", nightEnergy: "Nighttime Energy", peakSunHours: "Peak Sun Hours", autonomyDays: "Autonomy Days",
            batteryType: "Battery Type", lithium: "Lithium Ion (LiFePO4)", leadAcid: "Gel/AGM (Lead Acid)", simultaneityFactor: "Simultaneity Factor",
            inverterMargin: "Inverter Safety Margin", panelPower: "Single Panel Power (Wp)", batteryCapacity: "Single Battery Capacity (Ah)",
            batteryVoltage: "Battery Voltage (V)", systemVoltage: "System Voltage", calculate: "Calculate System", saveSystem: "Save System",

            formulaTotalEnergy: "Total Energy = Σ (Power × Hours)", formulaPvPower: "PV Power = (Total Energy × Loss Factor) ÷ (Peak Hours × Charger Efficiency)",
            formulaBattery: "Battery Capacity = (Night Energy × Autonomy Days) ÷ (DoD × Battery Efficiency × System Voltage)",
            formulaInverter: "Inverter Power = (Max Simultaneous Load × Safety Margin) ÷ Inverter Efficiency",
            chargerEfficiency: "Charger Efficiency", inverterEfficiency: "Inverter Efficiency", batteryEfficiency: "Battery Efficiency", lossFactor: "Loss Factor",
            warnings: "System Warnings", requiredArea: "Required Panel Area", systemCurrent: "System Current", cableSection: "Recommended Cable Section",
            tooltip_autonomy: "Number of days the system can operate without sun (consecutive cloudy days)",
            tooltip_simultaneity: "Percentage of devices operating simultaneously (ranges 0.3-0.8 depending on usage pattern)",
            tooltip_inverterMargin: "Additional percentage to protect inverter from high instantaneous loads",
            tooltip_chargerEfficiency: "MPPT charge controller efficiency (95-99%)",
            tooltip_inverterEfficiency: "DC to AC conversion efficiency (85-95%)",
            tooltip_batteryEfficiency: "Battery charge/discharge efficiency (80-90%)",
            tooltip_lossFactor: "Losses from cables, dust, and temperature (15-25%)",
            disclaimer: "⚠️ Note: These calculations are theoretical estimates based on default assumptions. Actual results may vary by 10-30% depending on: actual weather conditions (dust, heat, clouds) - equipment efficiency - actual usage pattern."

    };

    let currentLang = "ar";
    let currentStep = 1;
    let devices = [];
    let expandedDevices = new Set(); // only one active at a time (handle in toggle)
    
    let systemSettings = {
        peakSunHours: 5, autonomyDays: 2, batteryType: "lithium", simultaneityFactor: 0.7, inverterMargin: 0.2,
        chargerEfficiency: 0.97, inverterEfficiency: 0.92, batteryEfficiency: 0.85, lossFactor: 1.25
    };
    
    let componentSettings = {
        panelPower: 550, panelVoltage: 24, panelArea: 2.2, batteryCapacity: 200, batteryVoltage: 12, systemVoltage: null
    };
    
    let calculationResults = null;

    function t(key) { return translations[currentLang][key] || key; }

    function showToast(message) { let toast = document.querySelector(".toast"); if(toast) toast.remove(); const div = document.createElement("div"); div.className = "toast"; div.innerText = message; document.body.appendChild(div); setTimeout(() => div.remove(), 3000); }

    // --- Intelligent defaults based on totalEnergy & systemSettings ---
    function computeEstimatedPVPower() {
        const { totalEnergy } = calculateEnergy();
        if(totalEnergy === 0) return 0;
        return (totalEnergy * 1.3) / systemSettings.peakSunHours;
    }
    function getRecommendedPanelPower(estimatedPV) {
        if (estimatedPV < 1000) return 400;
        else if (estimatedPV < 3000) return 550;
        else if (estimatedPV < 6000) return 600;
        else return 670;
    }
    function getRecommendedSystemVoltage(estimatedPV) {
        if (estimatedPV < 1500) return 12;
        else if (estimatedPV < 4000) return 24;
        else return 48;
    }
    function getRecommendedBatterySpecs(estimatedPV, systemVoltage, totalEnergy) {
        const estimatedStorageEnergy = (totalEnergy * 0.6) / systemSettings.inverterEfficiency;
        const estimatedBatteryAh = estimatedStorageEnergy / systemVoltage;
        if (systemVoltage === 48) {
            let cap = 200;
            if (estimatedBatteryAh < 300) cap = 200;
            else if (estimatedBatteryAh < 600) cap = 300;
            else cap = 500;
            return { voltage: 48, capacity: cap };
        } else if (systemVoltage === 24) {
            let cap = 200;
            if (estimatedBatteryAh < 400) cap = 200;
            else if (estimatedBatteryAh < 800) cap = 300;
            else cap = 400;
            return { voltage: 12, capacity: cap };
        } else {
            let cap = 150;
            if (estimatedBatteryAh < 300) cap = 150;
            else if (estimatedBatteryAh < 600) cap = 200;
            else cap = 300;
            return { voltage: 12, capacity: cap };
        }
    }
    function applySmartComponentDefaults() {
        const { totalEnergy } = calculateEnergy();
        if(devices.length === 0) return;
        const estimatedPV = computeEstimatedPVPower();
        const recommendedPanelPower = getRecommendedPanelPower(estimatedPV);
        const recommendedSysVoltage = getRecommendedSystemVoltage(estimatedPV);
        const battSpecs = getRecommendedBatterySpecs(estimatedPV, recommendedSysVoltage, totalEnergy);
        componentSettings.panelPower = recommendedPanelPower;
        componentSettings.systemVoltage = null; // auto by default, but we prefill battery voltage/capacity
        componentSettings.batteryCapacity = battSpecs.capacity;
        componentSettings.batteryVoltage = battSpecs.voltage;
        if(recommendedSysVoltage === 48) componentSettings.panelVoltage = 48;
        else if(recommendedSysVoltage === 24) componentSettings.panelVoltage = 24;
        else componentSettings.panelVoltage = 24;
        componentSettings.panelArea = (recommendedPanelPower <= 400) ? 1.8 : (recommendedPanelPower <= 550 ? 2.2 : 2.6);
    }

        const newDevice = { id: Date.now(), name: currentLang === "ar" ? deviceTemplate.name : deviceTemplate.nameEn, power: deviceTemplate.power, hours: (deviceTemplate.name === "ثلاجة" || deviceTemplate.name === "Refrigerator") ? 24 : 4, usageType: "mixed", mixedRatio: 50, icon: deviceTemplate.icon };

    function toggleDeviceExpand(deviceId) {
        // Close all others, keep only this one open
        const newSet = new Set();
        if(!expandedDevices.has(deviceId)) newSet.add(deviceId);
        expandedDevices = newSet;
        renderCurrentStep();
        // auto-scroll to opened device after render
        setTimeout(() => {

            if(elem) elem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
    }
    
    function updateDevice(deviceId, field, value) { const device = devices.find(d => d.id === deviceId); if(device) { device[field] = field === "power" || field === "hours" ? parseFloat(value) || 0 : value; renderCurrentStep(); } }
    function deleteDevice(deviceId) { devices = devices.filter(d => d.id !== deviceId); expandedDevices.delete(deviceId); renderCurrentStep(); }
    function calculateEnergy() { let total=0, day=0, night=0; devices.forEach(d => { const daily = d.power * d.hours; total += daily; if(d.usageType === "day") day += daily; else if(d.usageType === "night") night += daily; else if(d.usageType === "mixed") { const r = (d.mixedRatio||50)/100; day += daily * r; night += daily * (1-r); } }); return { totalEnergy: total, dayEnergy: day, nightEnergy: night }; }
    function calculateMaxSimultaneousLoad() { let maxLoad = 0; devices.forEach(d => { let p = 0; if(d.usageType === 'day') p=0.3; else if(d.usageType === 'night') p=0.7; else if(d.usageType === 'mixed') { const r = (d.mixedRatio||50)/100; p = r*0.3 + (1-r)*0.7; } maxLoad += d.power * p; }); const totalPower = devices.reduce((s,d)=> s+d.power,0); return Math.max(maxLoad, totalPower*0.2); }
    function calculateSystem() {
        const { totalEnergy, nightEnergy } = calculateEnergy();
        if(devices.length === 0) return null;
        const dod = systemSettings.batteryType === "lithium" ? 0.8 : 0.5;
        const pvRequired = (totalEnergy * systemSettings.lossFactor) / (systemSettings.peakSunHours * systemSettings.chargerEfficiency);
        let recommendedVoltage = getRecommendedSystemVoltage(computeEstimatedPVPower());
        const systemVoltage = componentSettings.systemVoltage || recommendedVoltage;
        const batteryWh = (nightEnergy * systemSettings.autonomyDays) / (dod * systemSettings.batteryEfficiency);
        const batteryAh = batteryWh / systemVoltage;
        const maxSimultaneousLoad = calculateMaxSimultaneousLoad();
        const inverterPower = (maxSimultaneousLoad * (1 + systemSettings.inverterMargin)) / systemSettings.inverterEfficiency;
        const panelsCount = Math.ceil(pvRequired / componentSettings.panelPower);
        const batteriesCount = Math.ceil(batteryAh / componentSettings.batteryCapacity);
        const requiredArea = panelsCount * (componentSettings.panelArea || 2.2);
        const systemCurrent = inverterPower / systemVoltage;
        let cableSection = "2.5 mm²";
        if(systemCurrent > 100) cableSection = "35 mm²"; else if(systemCurrent > 60) cableSection = "16 mm²"; else if(systemCurrent > 30) cableSection = "10 mm²"; else if(systemCurrent > 20) cableSection = "6 mm²"; else if(systemCurrent > 10) cableSection = "4 mm²";
        const warnings = [];
        if(pvRequired > 10000) warnings.push(currentLang === "ar" ? "⚠️ استطاعة ألواح عالية جداً، يفضل استخدام نظام 48V" : "⚠️ Very high PV power, recommend 48V system");
        if(batteryAh > 2000) warnings.push(currentLang === "ar" ? "⚠️ سعة بطاريات كبيرة، تأكد من مساحة التخزين المناسبة" : "⚠️ Large battery capacity, ensure adequate storage space");
        if(inverterPower > 5000) warnings.push(currentLang === "ar" ? "⚠️ استطاعة انفرتر عالية، تأكد من نظام التبريد المناسب" : "⚠️ High inverter power, ensure proper cooling");
        if(requiredArea > 50) warnings.push(currentLang === "ar" ? `⚠️ المساحة المطلوبة ${Math.round(requiredArea)}م² كبيرة جداً` : `⚠️ Required area ${Math.round(requiredArea)}m² is very large`);
        calculationResults = { totalEnergy: Math.round(totalEnergy), dayEnergy: Math.round(calculateEnergy().dayEnergy), nightEnergy: Math.round(nightEnergy), pvRequired: Math.round(pvRequired), panelsCount, batteryAh: Math.round(batteryAh), batteriesCount, systemVoltage, inverterPower: Math.round(inverterPower), maxSimultaneousLoad: Math.round(maxSimultaneousLoad), requiredArea: Math.round(requiredArea), systemCurrent: Math.round(systemCurrent), cableSection, dod: Math.round(dod*100), peakSunHours: systemSettings.peakSunHours, autonomyDays: systemSettings.autonomyDays, warnings, efficiencies: { charger: systemSettings.chargerEfficiency, inverter: systemSettings.inverterEfficiency, battery: systemSettings.batteryEfficiency, loss: systemSettings.lossFactor } };
        renderCurrentStep();
    }
    
    function renderTooltip(fieldKey, labelText) {
        const tooltipKey = `tooltip_${fieldKey}`;
        if(translations[currentLang][tooltipKey]) {
            return `<div style="display:inline-flex;align-items:center;"><span>${labelText}</span><i class="fas fa-info-circle tooltip-icon" data-tooltip="${translations[currentLang][tooltipKey]}"></i></div>`;
        }
        return labelText;
    }
    
    function attachTooltipEvents() {
        document.querySelectorAll('.tooltip-icon').forEach(icon => {
            icon.removeEventListener('click', handleTooltipClick);
            icon.addEventListener('click', handleTooltipClick);
        });
    }
    function handleTooltipClick(e) {
        e.stopPropagation();
        const msg = e.currentTarget.getAttribute('data-tooltip');
        if(!msg) return;
        const existing = e.currentTarget.parentElement.querySelector('.tooltip-text');
        if(existing) existing.remove();
        const div = document.createElement('div');
        div.className = 'tooltip-text';
        div.innerText = msg;
        e.currentTarget.parentElement.appendChild(div);
        setTimeout(() => div.remove(), 3000);
        const removeOnClickOutside = (ev) => { if(!div.contains(ev.target) && ev.target !== e.currentTarget) { div.remove(); document.removeEventListener('click', removeOnClickOutside); } };
        setTimeout(() => document.addEventListener('click', removeOnClickOutside), 10);
    }

    }

    function goToStep(step) { currentStep = step; renderCurrentStep(); }
    function saveSettingsAndNext() { systemSettings.peakSunHours = parseFloat(document.getElementById("peakSunHours")?.value) || 5; systemSettings.autonomyDays = parseInt(document.getElementById("autonomyDays")?.value) || 2; systemSettings.batteryType = document.getElementById("batteryType")?.value || "lithium"; systemSettings.simultaneityFactor = parseFloat(document.getElementById("simultaneityFactor")?.value) || 0.7; systemSettings.inverterMargin = parseFloat(document.getElementById("inverterMargin")?.value) || 0.2; systemSettings.chargerEfficiency = parseFloat(document.getElementById("chargerEfficiency")?.value) || 0.97; systemSettings.inverterEfficiency = parseFloat(document.getElementById("inverterEfficiency")?.value) || 0.92; systemSettings.batteryEfficiency = parseFloat(document.getElementById("batteryEfficiency")?.value) || 0.85; systemSettings.lossFactor = parseFloat(document.getElementById("lossFactor")?.value) || 1.25; goToStep(3); }
    function saveComponentsAndCalculate() { componentSettings.panelPower = parseFloat(document.getElementById("panelPower")?.value) || 550; componentSettings.panelVoltage = parseFloat(document.getElementById("panelVoltage")?.value) || 24; componentSettings.panelArea = parseFloat(document.getElementById("panelArea")?.value) || 2.2; componentSettings.batteryCapacity = parseFloat(document.getElementById("batteryCapacity")?.value) || 200; componentSettings.batteryVoltage = parseFloat(document.getElementById("batteryVoltage")?.value) || 12; const sysVoltageSelect = document.getElementById("systemVoltage")?.value; componentSettings.systemVoltage = sysVoltageSelect === "auto" ? null : parseInt(sysVoltageSelect); calculateSystem(); goToStep(4); }
    function saveSystemToHistory() { if(devices.length===0){ showToast(t("emptyDevices")); return; } showToast(t("saved")); }
    function setLanguage(lang) { currentLang = lang; localStorage.setItem("designer_lang", lang); document.body.classList.toggle("rtl", lang === "ar"); document.getElementById("appTitle").innerText = t("appName"); renderCurrentStep(); }
    window.addDevice = addDevice; window.addCustomDevice = addCustomDevice; window.updateDevice = updateDevice; window.deleteDevice = deleteDevice; window.toggleDeviceExpand = toggleDeviceExpand; window.goToStep = goToStep; window.saveSettingsAndNext = saveSettingsAndNext; window.saveComponentsAndCalculate = saveComponentsAndCalculate; window.saveSystemToHistory = saveSystemToHistory;
    document.getElementById("backToMainBtn")?.addEventListener("click", () => { if(confirm(currentLang === "ar" ? "هل تريد الخروج من المصمم؟" : "Do you want to exit the designer?")) { window.location.href = "index.html"; } });
    document.getElementById("langToggleBtn")?.addEventListener("click", () => { setLanguage(currentLang === "ar" ? "en" : "ar"); });
    const savedLang = localStorage.getItem("designer_lang"); if(savedLang === "ar" || savedLang === "en") currentLang = savedLang; setLanguage(currentLang);


    // prevent back bnutton
    let backPressCount = 0;
    let timeoutId = null;

    // منع الخروج الافتراضي
    history.pushState(null, null, location.href);

    // الاستماع لضغط زر الرجوع
    window.addEventListener('popstate', function() {
        // إضافة حالة جديدة لمنع الخروج الفوري
        history.pushState(null, null, location.href);
        
        // زيادة عدد الضغطات
        backPressCount++;
        
        if (backPressCount === 1) {
            // الضغطة الأولى: عرض رسالة
            showToast('اضغط مرة أخرى للخروج من التطبيق');
            
            // إعادة تعيين العداد بعد 2 ثانية
            timeoutId = setTimeout(function() {
                backPressCount = 0;

            }, 2000);
        } 
        else if (backPressCount >= 2) {
            // الضغطة الثانية: إلغاء المؤقت والخروج
            clearTimeout(timeoutId);
            
            // تنفيذ الخروج
            exitApp();
        }
    });
        // end prevent back bnutton 
</script>
